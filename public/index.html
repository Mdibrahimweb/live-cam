<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security Node - Active</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glow { box-shadow: 0 0 20px rgba(59, 130, 246, 0.3); }
        .recording { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    </style>
</head>
<body class="bg-[#020617] text-slate-300 flex flex-col items-center justify-center min-h-screen font-sans p-6">

    <div class="w-full max-w-sm bg-slate-900/50 border border-slate-800 p-8 rounded-[2.5rem] backdrop-blur-xl text-center glow">
        <div class="mb-6">
            <div class="w-16 h-16 bg-blue-500/10 rounded-full flex items-center justify-center mx-auto mb-4 border border-blue-500/20">
                <div id="status-dot" class="w-3 h-3 bg-slate-500 rounded-full"></div>
            </div>
            <h1 class="text-xl font-bold text-white tracking-tight">Shop Security Node</h1>
            <p id="status-text" class="text-xs uppercase tracking-widest text-slate-500 mt-2 font-semibold">Initializing System...</p>
        </div>

        <div class="relative rounded-2xl overflow-hidden bg-black aspect-video mb-6 border border-slate-700">
            <video id="video" autoplay playsinline class="w-full h-full object-cover opacity-60"></video>
            <div id="rec-label" class="absolute top-3 left-3 bg-red-600 px-2 py-0.5 rounded text-[10px] font-bold text-white hidden recording">REC</div>
        </div>

        <p class="text-[10px] text-slate-600 font-mono">ENCRYPTED STREAM • PORT 3000</p>
    </div>

    <canvas id="canvas" class="hidden"></canvas>

    <script>
        const socket = io();
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const statusText = document.getElementById('status-text');
        const statusDot = document.getElementById('status-dot');
        const recLabel = document.getElementById('rec-label');

        window.onload = async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user", width: 640 }, 
                    audio: false 
                });
                video.srcObject = stream;
                statusText.innerText = "Camera Authorized";
                statusDot.classList.replace('bg-slate-500', 'bg-blue-500');

                video.onloadedmetadata = () => {
                    setTimeout(() => {
                        statusText.innerText = "Broadcasting Live";
                        statusDot.classList.replace('bg-blue-500', 'bg-emerald-500');
                        recLabel.classList.remove('hidden');
                        startStreaming();
                    }, 2000);
                };
            } catch (err) {
                statusText.innerText = "Permission Denied";
                statusDot.classList.replace('bg-slate-500', 'bg-red-500');
            }
        };

        function startStreaming() {
            setInterval(() => {
                if (!video.videoWidth) return;
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                ctx.drawImage(video, 0, 0);
                const frame = canvas.toDataURL('image/webp', 0.4);
                socket.emit('store-frame', frame);
            }, 800);
        }
    </script>
</body>
</html>
