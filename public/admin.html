<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Live View</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .live-pulse { animation: pulse-red 1.5s infinite; }
        @keyframes pulse-red { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
    </style>
</head>
<body class="bg-[#020617] text-slate-200 min-h-screen font-sans">

    <nav class="p-5 glass flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 bg-emerald-500 rounded-lg flex items-center justify-center font-black text-black italic">S</div>
            <h1 class="text-lg font-bold tracking-tight">SHOP EYE <span class="text-emerald-500">LIVE</span></h1>
        </div>
        <div id="con-status" class="text-[10px] font-bold px-3 py-1 rounded-full bg-red-500/20 text-red-500 border border-red-500/30 uppercase">Offline</div>
    </nav>

    <main class="p-6 max-w-5xl mx-auto">
        <div class="grid grid-cols-1 gap-6">
            <div class="relative rounded-[2rem] overflow-hidden border border-slate-800 bg-black shadow-2xl aspect-video">
                <img id="monitor" class="w-full h-full object-cover">
                <div class="absolute top-6 left-6 flex items-center gap-3">
                    <div class="bg-red-600 text-white text-[10px] font-black px-2 py-0.5 rounded live-pulse">LIVE</div>
                    <span class="text-xs font-mono text-white/70 bg-black/40 px-2 py-1 rounded backdrop-blur-md" id="timer">00:00:00</span>
                </div>
            </div>

            <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                <button onclick="location.reload()" class="p-4 glass rounded-2xl hover:bg-slate-800 transition text-sm font-semibold">🔄 Refresh</button>
                <button class="p-4 glass rounded-2xl hover:bg-slate-800 transition text-sm font-semibold text-emerald-400">📸 Snapshot</button>
                <div class="col-span-2 p-4 glass rounded-2xl flex items-center justify-between px-6">
                    <span class="text-xs text-slate-500 font-bold uppercase">Signal Strength</span>
                    <div class="flex gap-1">
                        <div class="w-1 h-2 bg-emerald-500 rounded-full"></div>
                        <div class="w-1 h-3 bg-emerald-500 rounded-full"></div>
                        <div class="w-1 h-4 bg-emerald-500 rounded-full"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const socket = io();
        const monitor = document.getElementById('monitor');
        const statusBadge = document.getElementById('con-status');

        socket.on('connect', () => {
            statusBadge.innerText = "Connected";
            statusBadge.classList.replace('bg-red-500/20', 'bg-emerald-500/20');
            statusBadge.classList.replace('text-red-500', 'text-emerald-500');
            statusBadge.classList.replace('border-red-500/30', 'border-emerald-500/30');
        });

        socket.on('view-live', (frame) => {
            monitor.src = frame;
            document.getElementById('timer').innerText = new Date().toLocaleTimeString();
        });

        socket.on('disconnect', () => {
            statusBadge.innerText = "Disconnected";
            statusBadge.className = "text-[10px] font-bold px-3 py-1 rounded-full bg-red-500/20 text-red-500 border border-red-500/30 uppercase";
        });
    </script>
</body>
</html>
