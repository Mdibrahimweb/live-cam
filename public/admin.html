<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin HD Monitor</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); }
        .monitor-bg { background: radial-gradient(circle, #0f172a 0%, #020617 100%); }
    </style>
</head>
<body class="monitor-bg text-slate-200 min-h-screen font-sans overflow-x-hidden">

    <nav class="p-4 glass flex justify-between items-center sticky top-0 z-50 border-b border-white/5">
        <h1 class="text-sm font-black tracking-tighter">SHOP EYE <span class="text-emerald-500">PRO HD</span></h1>
        <div id="con-status" class="text-[10px] font-bold px-3 py-1 rounded-full bg-red-500/20 text-red-500 border border-red-500/30 uppercase">Offline</div>
    </nav>

    <main class="p-4">
        <div class="relative w-full max-w-5xl mx-auto rounded-3xl overflow-hidden border-4 border-slate-800 shadow-2xl bg-black aspect-video">
            <img id="monitor" class="w-full h-full object-contain">
            <div class="absolute top-4 right-4 text-[10px] font-mono bg-black/50 px-2 py-1 rounded text-white/50" id="clock">00:00:00</div>
        </div>
        
        <div class="mt-6 flex justify-center">
            <button onclick="location.reload()" class="px-8 py-3 bg-white/5 hover:bg-white/10 border border-white/10 rounded-2xl transition-all text-sm font-bold">
                Reconnect Stream
            </button>
        </div>
    </main>

    <script>
        const socket = io();
        const monitor = document.getElementById('monitor');
        const statusBadge = document.getElementById('con-status');
        const clock = document.getElementById('clock');

        socket.on('connect', () => {
            statusBadge.innerText = "Live Connected";
            statusBadge.className = "text-[10px] font-bold px-3 py-1 rounded-full bg-emerald-500/20 text-emerald-500 border border-emerald-500/30 uppercase";
        });

        socket.on('view-live', (frame) => {
            monitor.src = frame;
            clock.innerText = new Date().toLocaleTimeString();
        });

        socket.on('disconnect', () => {
            statusBadge.innerText = "Connection Lost";
            statusBadge.className = "text-[10px] font-bold px-3 py-1 rounded-full bg-red-500/20 text-red-500 border border-red-500/30 uppercase";
        });
    </script>
</body>
</html>
