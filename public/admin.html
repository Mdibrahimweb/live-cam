<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin HD Monitor</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); }
        .monitor-bg { background: radial-gradient(circle, #0f172a 0%, #020617 100%); }
    </style>
</head>
<body class="monitor-bg text-slate-200 min-h-screen font-sans">

    <nav class="p-4 glass flex justify-between items-center sticky top-0 z-50 border-b border-white/5">
        <h1 class="text-sm font-black tracking-tighter italic text-emerald-500">SHOP EYE <span class="text-white">PRO</span></h1>
        <div id="con-status" class="text-[9px] font-bold px-3 py-1 rounded-full bg-red-500/20 text-red-500 border border-red-500/30 uppercase">Offline</div>
    </nav>

    <main class="p-4">
        <div class="relative w-full max-w-5xl mx-auto rounded-[2rem] overflow-hidden border-2 border-slate-800 bg-black shadow-2xl aspect-video">
            <img id="monitor" class="w-full h-full object-contain">
            <div class="absolute bottom-4 left-4 bg-black/40 backdrop-blur-md px-3 py-1 rounded text-[10px] font-mono text-white/70" id="timer">Waiting for stream...</div>
        </div>
        
        <div class="mt-6 flex gap-4 justify-center">
            <button onclick="location.reload()" class="flex-1 max-w-[150px] py-4 glass rounded-2xl hover:bg-slate-800 transition text-xs font-bold uppercase tracking-widest">Refresh</button>
            <button id="snapBtn" class="flex-1 max-w-[150px] py-4 bg-emerald-600 rounded-2xl text-black hover:bg-emerald-400 transition text-xs font-bold uppercase tracking-widest">Snapshot</button>
        </div>
    </main>

    <script>
        const socket = io();
        const monitor = document.getElementById('monitor');
        const statusBadge = document.getElementById('con-status');
        const snapBtn = document.getElementById('snapBtn');

        socket.on('connect', () => {
            statusBadge.innerText = "System Online";
            statusBadge.className = "text-[9px] font-bold px-3 py-1 rounded-full bg-emerald-500/20 text-emerald-500 border border-emerald-500/30 uppercase";
        });

        socket.on('view-live', (frame) => {
            monitor.src = frame;
            document.getElementById('timer').innerText = `HD FEED - ${new Date().toLocaleTimeString()}`;
        });

        // স্নাপশট ডাউনলোড লজিক
        snapBtn.onclick = () => {
            const link = document.createElement('a');
            link.href = monitor.src;
            link.download = `security_snap_${Date.now()}.webp`;
            link.click();
        };

        socket.on('disconnect', () => {
            statusBadge.innerText = "System Offline";
            statusBadge.className = "text-[9px] font-bold px-3 py-1 rounded-full bg-red-500/20 text-red-500 border border-red-500/30 uppercase";
        });
    </script>
</body>
</html>
